<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navo Game Shop</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
}
header{
    background:#1e1e1e;
    padding:20px;
    text-align:center;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}
.card{
    background:#222;
    width:280px;
    padding:15px;
    border-radius:10px;
}
.card img{
    width:100%;
    border-radius:10px;
}
button{
    background:#00c853;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}
footer{
    text-align:center;
    padding:20px;
    background:#1e1e1e;
}
</style>
</head>
<body><header>
    <h1>Navo Game Shop</h1>
    <p>Oyun Hesapları ve Dijital Ürünler</p>
</header><div class="products">
    <div class="card">
        <img src="https://via.placeholder.com/280x180" alt="">
        <h3>Valorant Hesabı</h3>
        <p>Seviye 150 - Birçok skin mevcut</p>
        <h2>500₺</h2>
        <button>Satın Al</button>
    </div><div class="card">
    <img src="https://via.placeholder.com/280x180" alt="">
    <h3>FC 26 Hesabı</h3>
    <p>Güçlü kadro ve yüksek coin</p>
    <h2>750₺</h2>
    <button>Satın Al</button>
</div>

</div><footer>
    © 2026 Navo Game Shop
</footer></body>
</html>
